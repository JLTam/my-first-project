<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Introduction</title>
    <link rel="stylesheet" href="mystyle.css"> 
</head>
<body>

    <div class="profile-card">
        <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-img">
        
        <h1 class="profile-name">Alex Doe</h1>
        <h2 class="profile-title">Web Developer & Designer</h2>
        
        <p class="profile-bio">
            Hi! I'm a passionate developer who loves creating beautiful, functional, and user-friendly web experiences. When I'm not coding, you can find me hiking or reading sci-fi.
        </p>
        
        <div class="social-links">
            <a href="#" class="btn">GitHub</a>
            <a href="#" class="btn">LinkedIn</a>
            <a href="#" class="btn">Email Me</a>
        </div>
    </div>

</body>
</html>
